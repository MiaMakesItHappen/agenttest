version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: agenttest-postgres
    environment:
      POSTGRES_USER: agenttest
      POSTGRES_PASSWORD: agenttest
      POSTGRES_DB: agenttest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
